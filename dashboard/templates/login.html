<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Research Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f1f5f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); width: 100%; max-width: 400px; }
        h2 { margin-top: 0; color: #1e293b; text-align: center; margin-bottom: 25px; }
        input { padding: 12px; width: 100%; margin-bottom: 15px; border: 1px solid #cbd5e1; border-radius: 6px; display: block; box-sizing: border-box; }
        button { padding: 12px; background-color: #3498db; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; font-size: 16px; }
        button:hover { background-color: #2980b9; }
        .error-msg { color: #ef4444; background: #fee2e2; padding: 10px; border-radius: 4px; font-size: 14px; margin-bottom: 15px; text-align: center; }
    </style>
</head>
<body>

<div class="login-card">
    <h2>🔒 Professor Login</h2>
    
    {% if error %}
        <div class="error-msg">{{ error }}</div>
    {% endif %}

    <form method="POST" action="{% url 'login_view' %}">
        {% csrf_token %}
        <input type="text" name="username" placeholder="Username (Professor Name)" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Sign In</button>
    </form>
</div>

</body>
</html>
